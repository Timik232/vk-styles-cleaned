name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.2)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release (not latest)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Extension ZIP & Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qP '^v\d+\.\d+\.\d+(\.\d+)?$'; then
            echo "::error::Version must match format: v1.2.3 or v1.2.3.4"
            exit 1
          fi

      - name: Verify manifest version matches
        run: |
          MANIFEST_VER=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          INPUT_VER="${{ inputs.version }}"
          INPUT_VER="${INPUT_VER#v}"
          if [ "$MANIFEST_VER" != "$INPUT_VER" ]; then
            echo "::warning::manifest.json version ($MANIFEST_VER) differs from release version ($INPUT_VER)."
            echo "Consider updating manifest.json before release."
          fi

      - name: Prepare release staging
        run: |
          rm -rf build
          mkdir -p build/package
          cp manifest.json build/package/
          cp 0.js build/package/
          cp 1.js build/package/
          cp 2.js build/package/
          cp css build/package/
          cp mcss build/package/
          cp -r _locales build/package/
          cp -r i build/package/
          echo "Staged release files:"
          find build/package -maxdepth 2 -type f | sort

      - name: Build extension ZIP
        run: |
          cd build/package
          zip -r "../vk-styles-clean-${{ inputs.version }}.zip" .
          echo "Built: build/vk-styles-clean-${{ inputs.version }}.zip"
          ls -lh ..

      - name: Build extension RAR
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq rar
          cd build/package
          rar a -r "../vk-styles-clean-${{ inputs.version }}.rar" .
          echo "Built: build/vk-styles-clean-${{ inputs.version }}.rar"
          ls -lh ..

      - name: Extract changelog for version
        id: notes
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog entry found for version $VERSION in CHANGELOG.md"
            NOTES="No changelog entry found. Please update CHANGELOG.md."
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: VK Styles Clean ${{ inputs.version }}
          body: |
            ## ${{ inputs.version }}

            ${{ steps.notes.outputs.body }}

            ---

            ### Установка / Installation

            1. Скачайте архив (ZIP или RAR) из Assets ниже / Download archive from Assets below
            2. Распакуйте в папку / Extract to a folder
            3. Откройте страницу расширений / Open extensions page:
               - **Chrome / Edge:** `chrome://extensions/`
               - **Другие браузеры:** `browser://extensions/`
            4. Включите "Режим разработчика" / Enable "Developer mode" (top-right toggle)
            5. Нажмите "Загрузить распакованное" / "Load unpacked" and select the folder
          files: |
            build/vk-styles-clean-${{ inputs.version }}.zip
            build/vk-styles-clean-${{ inputs.version }}.rar
          draft: false
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.prerelease == false }}
